inherit: 
    - models/standard.yaml
    - wandb.yaml

model:
    n_dims: 8
    n_positions: 101

training:
    data: gaussian 
    task_kwargs: {}
    batch_size: 64
    learning_rate: 0.0001
    save_every_steps: 1000
    keep_every_steps: 50000
    train_steps: 500001
    curriculum:
        dims:
            start: 8
            end: 8
            inc: 1
            interval: 2000
